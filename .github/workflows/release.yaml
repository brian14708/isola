name: Release

on:
  release:
    types: [created]

permissions: {}

env:
  GH_REPO: ${{ github.repository }}

jobs:
  targets:
    name: Tag
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release tag
        id: resolve
        run: |
          echo "release_tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
  python-runtime:
    name: Python Runtime
    needs: targets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: isola
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build Python package
        run: nix --accept-flake-config build .#python
      - name: Package release artifacts
        run: |
          mkdir -p dist
          tar -C result -czf dist/isola-python-runtime.tar.gz \
            --mode='u+rwX,go+rX,go-w' \
            --transform='s,^,isola-python-runtime/,' \
            bin lib
      - name: Upload artifacts to target release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.targets.outputs.release_tag }}" -R "$GH_REPO" \
            dist/isola-python-runtime.tar.gz \
            --clobber

  js-runtime:
    name: JS Runtime
    needs: targets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Install Nix
        uses: cachix/install-nix-action@v31
      - name: Setup Cachix
        uses: cachix/cachix-action@v17
        with:
          name: isola
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"
      - name: Build JS package
        run: nix --accept-flake-config build .#js
      - name: Package release artifacts
        run: |
          tar -C result -czf isola-js-runtime.tar.gz \
            --mode='u+rwX,go+rX,go-w' \
            --transform='s,^,isola-js-runtime/,' \
            bin
      - name: Upload artifacts to target release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.targets.outputs.release_tag }}" -R "$GH_REPO" \
            isola-js-runtime.tar.gz \
            --clobber

  python-sdk:
    name: Python SDK Wheel (${{ matrix.settings.target }})
    needs: targets
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    permissions:
      contents: read
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Build Linux Python SDK wheel
        if: runner.os == 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.settings.target }}
          manylinux: "2014"
          args: --release --manifest-path crates/python-sdk/Cargo.toml --out dist -i python3.10
      - name: Build host Python SDK wheel
        if: runner.os != 'Linux'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.settings.target }}
          args: --release --manifest-path crates/python-sdk/Cargo.toml --out dist
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-sdk-${{ matrix.settings.target }}
          path: dist/*
          if-no-files-found: error

  python-sdk-publish:
    name: Python SDK Publish
    needs: [targets, python-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Setup uv
        uses: astral-sh/setup-uv@v7
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: python-sdk-*
          path: dist
          merge-multiple: true
      - name: Publish
        run: |
          uv publish dist/*

  library:
    needs: targets
    name: Library (${{ matrix.settings.target }})
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libisola.so
            archive_name: libisola-x86_64-unknown-linux-gnu.tar.gz
            import_lib: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            lib_name: libisola.so
            archive_name: libisola-aarch64-unknown-linux-gnu.tar.gz
            import_lib: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libisola.dylib
            archive_name: libisola-aarch64-apple-darwin.tar.gz
            import_lib: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: isola.dll
            archive_name: libisola-x86_64-pc-windows-msvc.tar.gz
            import_lib: isola.dll.lib
    runs-on: ${{ matrix.settings.os }}
    permissions:
      contents: write
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.settings.target }}
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Package library artifact
        shell: bash
        run: |
          mkdir -p dist
          mkdir -p dist/libisola/lib

          cargo build --locked --release --target "${{ matrix.settings.target }}" -p isola-c-api-export

          target_dir="target/${{ matrix.settings.target }}/release"
          cp "$target_dir/${{ matrix.settings.lib_name }}" dist/libisola/lib/
          if [ -n "${{ matrix.settings.import_lib }}" ]; then
            import_lib_path="$target_dir/${{ matrix.settings.import_lib }}"
            if [ ! -f "$import_lib_path" ]; then
              import_lib_path="$(find "$target_dir" -maxdepth 1 -type f -name '*.lib' | head -n 1)"
            fi
            if [ -z "$import_lib_path" ] || [ ! -f "$import_lib_path" ]; then
              echo "missing import library in $target_dir" >&2
              exit 1
            fi
            cp "$import_lib_path" dist/libisola/lib/
          fi
          cp -r crates/c-api/include dist/libisola/
          tar -C dist/libisola -czf "dist/${{ matrix.settings.archive_name }}" lib include
      - name: Upload library artifact to target release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ needs.targets.outputs.release_tag }}" -R "$GH_REPO" \
            "dist/${{ matrix.settings.archive_name }}" \
            --clobber

  cargo_publish:
    name: Cargo
    needs: targets
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Authenticate with crates.io
        id: cargo_auth
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish crates to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.cargo_auth.outputs.token }}
        run: |
          cargo publish --locked --registry crates-io

  js-sdk:
    name: JS SDK (${{ matrix.settings.target }})
    needs: targets
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_dir: linux-x64-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            package_dir: linux-arm64-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
            package_dir: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            package_dir: win32-x64-msvc
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.settings.target }}
      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
      - name: Install dependencies
        run: pnpm install
      - name: Build native module
        run: pnpm --filter isola-core run build -- --target ${{ matrix.settings.target }}
      - name: Stage platform package
        shell: bash
        run: cp crates/js-sdk/npm/dist/isola.*.node crates/js-sdk/npm/${{ matrix.settings.package_dir }}/
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: js-sdk-${{ matrix.settings.target }}
          path: |
            crates/js-sdk/npm/dist
            crates/js-sdk/npm/${{ matrix.settings.package_dir }}
          if-no-files-found: error

  js-sdk-publish:
    name: JS SDK Publish
    needs: [targets, js-sdk]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
      - name: Install pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest
      - name: Install dependencies
        run: pnpm install
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: js-sdk-*
          path: crates/js-sdk/npm
          merge-multiple: true
      - name: Publish platform packages
        working-directory: crates/js-sdk/npm
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec napi pre-publish --npm-dir . --no-gh-release
      - name: Publish root package
        working-directory: crates/js-sdk/npm
        env:
          NPM_CONFIG_PROVENANCE: true
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
